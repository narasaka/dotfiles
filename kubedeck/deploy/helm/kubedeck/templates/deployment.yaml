apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubedeck.fullname" . }}
  labels:
    {{- include "kubedeck.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubedeck.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubedeck.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubedeck.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KUBEDECK_PORT
              value: "8080"
            - name: KUBEDECK_DB_PATH
              value: "/data/kubedeck.db"
            - name: KUBEDECK_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: KUBEDECK_APP_NAMESPACE
              value: {{ .Values.config.defaultNamespace | default "kubedeck-apps" }}
            {{- if .Values.config.sessionSecret }}
            - name: KUBEDECK_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubedeck.fullname" . }}-secret
                  key: session-secret
            {{- end }}
            {{- if .Values.registry.url }}
            - name: KUBEDECK_REGISTRY_URL
              value: {{ .Values.registry.url }}
            - name: KUBEDECK_REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubedeck.fullname" . }}-secret
                  key: registry-username
            - name: KUBEDECK_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubedeck.fullname" . }}-secret
                  key: registry-password
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/auth/check
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/auth/check
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kubedeck.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
